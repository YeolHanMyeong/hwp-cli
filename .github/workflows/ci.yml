name: CI

on:
  push:
    branches: [main]
  pull_request:
  # release.yml 이 태그 릴리스 전에 이 test 잡을 재사용(테스트 통과 게이트)한다.
  workflow_call:

env:
  CARGO_TERM_COLOR: always

# 같은 브랜치에 새 push가 오면 이전 실행은 취소한다(낭비·지연 감소).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          # 필수: ubuntu(CI 기준선) + macOS(소유자 주 사용 플랫폼)
          - { os: ubuntu-latest }
          - { os: macos-latest }
          # 참고용: Windows는 실패 허용(비차단) — 가시성만 확보.
          - { os: windows-latest, experimental: true }
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental == true }}
    steps:
      - uses: actions/checkout@v4
      - name: 한국어 폰트 설치 (렌더링 테스트용)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk
      # MSRV(Cargo.toml rust-version)로 고정 — rustfmt/clippy 결과를 결정적으로
      # 만들고(stable 부동 시 버전 드리프트로 통과하던 코드가 갑자기 실패), 선언한
      # 최소 지원 버전에서 실제로 빌드되는지 보장한다.
      - uses: dtolnay/rust-toolchain@1.93.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      # 세 검사는 서로 독립이므로 앞 단계가 실패해도 모두 실행해 한 번에 보고한다
      # (fmt 실패가 clippy/test 실패를 가리지 않게 — 디버깅 왕복 감소).
      - name: 포맷 검사
        run: cargo fmt --check
      - name: Clippy
        if: ${{ !cancelled() }}
        run: cargo clippy --all-targets -- -D warnings
      - name: 테스트
        if: ${{ !cancelled() }}
        run: cargo test --workspace
